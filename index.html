<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #060608;
  --surface: #0e0e12;
  --surface2: #141418;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.14);
  --text: #f0eee9;
  --muted: #6b6b72;
  --muted2: #9999a3;
  --lime: #c8fb4a;
  --lime-dim: rgba(200,251,74,0.12);
  --lime-glow: rgba(200,251,74,0.25);
  --blue: #4a9bfb;
  --blue-dim: rgba(74,155,251,0.1);
  --grad: linear-gradient(135deg, #c8fb4a 0%, #4a9bfb 100%);
}

html { scroll-behavior: smooth; scroll-padding-top: 80px; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves=[...]");
  pointer-events: none; opacity: 0.4;
}

a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  background: rgba(6,6,8,0.8);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1280px; margin: auto;
  padding: 0 2.5rem;
  height: 72px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
}
.nav-logo img {
  width: 44px; height: 44px; object-fit: contain;
  filter: brightness(0) invert(1);
}
.nav-logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem; letter-spacing: 0.05em;
  color: var(--text);
}
.nav-links {
  display: flex; align-items: center; gap: 2.5rem; list-style: none;
}
.nav-links a {
  font-size: 0.88rem; font-weight: 500;
  color: var(--muted2); letter-spacing: 0.01em;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--text); }
.nav-cta {
  padding: 0.6rem 1.4rem;
  background: var(--lime); color: #000 !important;
  border-radius: 8px; font-weight: 700 !important;
  font-size: 0.82rem !important; letter-spacing: 0.02em !important;
  transition: transform 0.2s, box-shadow 0.2s !important;
}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--lime-glow) !important; }

.hamburger {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; background: none; border: none; padding: 4px; z-index: 920;
}
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--text); border-radius: 2px; transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

.mobile-drawer {
  display: none;
  position: fixed; inset: 0; z-index: 910;
  background: rgba(6,6,8,0.97);
  backdrop-filter: blur(24px);
  flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem;
  opacity: 0; transition: opacity 0.3s;
}
.mobile-drawer.show { opacity: 1; }
.mobile-drawer a {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; letter-spacing: 0.05em; color: var(--text);
  transition: color 0.2s;
}
.mobile-drawer a:hover { color: var(--lime); }
.mobile-drawer .mob-cta {
  font-family: 'Plus Jakarta Sans', sans-serif !important;
  font-size: 1rem !important; font-weight: 700;
  background: var(--lime); color: #000; padding: 1rem 3rem;
  border-radius: 8px; letter-spacing: 0.02em;
}

@media (max-width: 900px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .mobile-drawer { display: flex; }
  .nav-inner { padding: 0 1.5rem; }
}

/* ── HERO ── */
.hero {
  min-height: 100svh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 10rem 2.5rem 6rem;
  position: relative; overflow: hidden;
  max-width: 1280px; margin: auto;
}

/* Animated grid background */
.hero-grid {
  position: fixed; inset: 0; z-index: 0;
  background-size: 60px 60px;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 40%, transparent 100%);
}

.hero-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none; z-index: 0;
}
.blob1 {
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(200,251,74,0.07) 0%, transparent 70%);
  top: -200px; left: -150px;
  animation: float1 8s ease-in-out infinite;
}
.blob2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(74,155,251,0.07) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: float2 10s ease-in-out infinite;
}
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-40px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,30px)} }

.hero-content { position: relative; z-index: 1; }

.hero-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.35rem 0.9rem 0.35rem 0.5rem;
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 100px; margin-bottom: 2.5rem;
  animation: fadeUp 0.7s ease both;
}
.hero-pill-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--lime);
  box-shadow: 0 0 8px var(--lime-glow);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100%{box-shadow:0 0 4px var(--lime-glow)} 50%{box-shadow:0 0 16px var(--lime-glow)} }
.hero-pill span { font-size: 0.78rem; font-weight: 500; color: var(--muted2); letter-spacing: 0.05em; }

.hero-headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 11vw, 10rem);
  line-height: 0.92;
  letter-spacing: 0.01em;
  margin-bottom: 2rem;
  animation: fadeUp 0.7s 0.1s ease both;
}
.hero-headline .grad-text {
  background: var(--grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--muted2); line-height: 1.7; font-weight: 400;
  max-width: 560px; margin-bottom: 3rem;
  animation: fadeUp 0.7s 0.2s ease both;
}

.hero-actions {
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  animation: fadeUp 0.7s 0.3s ease both;
}

.btn-lime {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.9rem 1.8rem;
  background: var(--lime); color: #000;
  border-radius: 8px; font-weight: 700; font-size: 0.9rem;
  border: none; transition: all 0.25s; cursor: pointer;
}
.btn-lime:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--lime-glow); }
.btn-lime svg { transition: transform 0.2s; }
.btn-lime:hover svg { transform: translateX(3px); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.9rem 1.8rem;
  border: 1px solid var(--border-bright); color: var(--text);
  border-radius: 8px; font-weight: 500; font-size: 0.9rem;
  transition: all 0.25s;
}
.btn-outline:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.04); }

.btn-wa {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.9rem 1.8rem;
  background: #25D366; color: #fff;
  border-radius: 8px; font-weight: 600; font-size: 0.9rem;
  transition: all 0.25s;
}
.btn-wa:hover { background: #20bc5a; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,211,102,0.3); }

.hero-scroll-hint {
  position: absolute; bottom: 2.5rem; left: 0;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.72rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  animation: fadeUp 0.7s 0.5s ease both;
}
.scroll-track { width: 36px; height: 1px; background: var(--muted); position: relative; overflow: hidden; }
.scroll-track::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%;
  height: 100%; background: var(--lime);
  animation: track-slide 2s ease infinite;
}
@keyframes track-slide { to { left: 100%; } }

.hero-stats {
  position: absolute; bottom: 2.5rem; right: 0;
  display: flex; gap: 2.5rem;
  animation: fadeUp 0.7s 0.55s ease both;
}
.hero-stats > div { min-width: 0; }
.hstat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem; line-height: 1; letter-spacing: 0.03em;
}
.hstat-label {
  font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-top: 2px; line-height: 1.25;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TICKER ── */
.ticker {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden; padding: 1.2rem 0;
  background: var(--surface);
}
.ticker-track {
  display: flex; gap: 4rem;
  width: max-content; white-space: nowrap;
  animation: ticker-roll 30s linear infinite;
}
.ticker-item {
  display: flex; align-items: center; gap: 1.5rem;
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
  flex-shrink: 0;
}
.ticker-item::before { content: '◆'; color: var(--lime); font-size: 0.45rem; }
@keyframes ticker-roll { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ── SECTIONS ── */
.wrap { max-width: 1280px; margin: auto; padding: 0 2.5rem; }
section { padding: 8rem 0; position: relative; }

.label {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--lime); margin-bottom: 1.5rem;
}
.label::before { content: ''; display: block; width: 20px; height: 1px; background: var(--lime); }

.big-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 5vw, 5rem);
  line-height: 0.95; letter-spacing: 0.02em;
  margin-bottom: 1.5rem;
}
.body-text { font-size: 1rem; color: var(--muted2); line-height: 1.8; font-weight: 400; max-width: 540px; }

/* ── SERVICES ── */
#services { background: var(--surface); }
.services-head {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: end;
  margin-bottom: 5rem;
}
.services-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--border); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.svc-card {
  background: var(--surface);
  padding: 2.5rem 2rem 3.5rem;
  position: relative; transition: background 0.3s;
}
.svc-card:hover { background: var(--surface2); }
.svc-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.8rem; letter-spacing: 0.12em;
  color: var(--muted); margin-bottom: 2rem;
  transition: color 0.3s;
}
.svc-card:hover .svc-num { color: var(--lime); }
.svc-icon {
  width: 48px; height: 48px;
  background: var(--lime-dim); border: 1px solid rgba(200,251,74,0.2);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; margin-bottom: 1.5rem;
}
.svc-card h3 {
  font-size: 1.05rem; font-weight: 700; margin-bottom: 0.75rem;
}
.svc-card p { font-size: 0.86rem; color: var(--muted2); line-height: 1.7; }
.svc-arrow {
  position: absolute; bottom: 2rem; right: 2rem;
  width: 30px; height: 30px; border: 1px solid var(--border-bright);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; color: var(--muted); transition: all 0.3s;
}
.svc-card:hover .svc-arrow { border-color: var(--lime); color: var(--lime); transform: rotate(45deg); }

/* ── WHY ── */
#why { background: var(--bg); }
.why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
.why-feats { display: flex; flex-direction: column; margin-top: 2rem; }
.why-feat {
  display: flex; gap: 1.5rem; padding: 1.75rem 0;
  border-bottom: 1px solid var(--border);
}
.why-feat-icon {
  width: 42px; height: 42px; flex-shrink: 0;
  background: var(--lime-dim); border: 1px solid rgba(200,251,74,0.2);
  border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.why-feat h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; }
.why-feat p { font-size: 0.84rem; color: var(--muted2); line-height: 1.65; }
.why-stats { display: flex; flex-direction: column; gap: 1rem; }
.wstat-big {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 2.5rem;
}
.wstat-big-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5rem; letter-spacing: 0.02em; color: var(--lime); line-height: 1;
}
.wstat-big-label { font-size: 0.85rem; color: var(--muted2); margin-top: 0.4rem; }
.wstat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.wstat-sm {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem;
}
.wstat-sm-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem; letter-spacing: 0.03em; line-height: 1;
}
.wstat-sm-label { font-size: 0.75rem; color: var(--muted2); margin-top: 0.3rem; }

/* ── PORTFOLIO ── */
#portfolio { background: var(--surface); }
.port-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 4rem; flex-wrap: wrap; gap: 1.5rem;
}
.port-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.port-card { border-radius: 14px; overflow: hidden; }
.port-card:first-child { grid-row: span 2; }
.port-thumb {
  aspect-ratio: 16/10; position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-end;
  padding: 1.75rem; transition: transform 0.4s;
}
.port-card:first-child .port-thumb { aspect-ratio: unset; height: 100%; min-height: 360px; }
.port-card:hover .port-thumb { transform: scale(1.02); }
.port-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
}
.pb1 { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
.pb2 { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
.pb3 { background: linear-gradient(135deg, #0d1b2a, #1b4332, #081c15); }
.pb4 { background: linear-gradient(135deg, #2d1b69, #11052c, #1a0533); }
.port-mock {
  position: absolute; top: 1.2rem; left: 1.2rem; right: 1.2rem;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; overflow: hidden; bottom: 4.5rem;
}
/* E-commerce mockup */
.pm-ecom { display: flex; flex-direction: column; height: 100%; }
.pm-ecom-nav { height: 28px; background: rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; padding: 0 10px; gap: 6px; }
.pm-ecom-dot { width: 6px; height: 6px; border-radius: 50%; }
.pm-ecom-body { flex: 1; padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; overflow: hidden; }
.pm-prod { background: rgba(255,255,255,0.05); border-radius: 6px; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
.pm-prod-img { background: rgba(200,251,74,0.12); border-radius: 4px; flex: 1; min-height: 36px; }
.pm-prod-line { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.1); }
.pm-prod-price { height: 4px; border-radius: 4px; background: rgba(200,251,74,0.4); width: 60%; }
.pm-ecom-footer { height: 26px; background: rgba(200,251,74,0.1); border-top: 1px solid rgba(200,251,74,0.2); display: flex; align-items: center; justify-content: center; }
.pm-cart-btn { width: 70%; height: 10px; border-radius: 3px; background: rgba(200,251,74,0.3); }
/* Mobile app mockup */
